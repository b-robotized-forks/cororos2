python_executable: python3
device: /dev/serial/by-id/usb-03eb_USB_Roboclaw_2x60A-if00
baud: 115200
address: 128
use_encoder: false
max_speed: 1.2
ticks_at_max_speed: 32760.0
acceleration: 32000
ticks_per_meter: 4342.2
m1_invert: false
m2_invert: false
m1_encoder_sign: 1
m2_encoder_sign: 1
wheel_radius: 0.129
status_interval_sec: 2.0
